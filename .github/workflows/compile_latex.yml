name: Compile LaTeX PDFs from specific folder

on:
  push:
    branches: [ main ]  # ggf. auf master ändern

jobs:
  build_folder_latex:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install missing packages (if any)
        run: |
          # Beispiel: tlmgr install <paket1> <paket2>
          # Falls Sie bestimmte Pakete benötigen, fügen Sie sie hier ein.
          # tlmgr install ... 
          # Aktualisieren Sie ggf. die Paketdatenbank
          tlmgr update --self --all || true

      - name: Find and compile LaTeX files in target folder
        run: |
          TARGET_DIR="Politics"
          
          if [ ! -d "$TARGET_DIR" ]; then
            echo "CRITICAL ERROR: The folder '$TARGET_DIR' does not exist!"
            exit 1
          fi

          mkdir -p pdf_outputs
          
          echo "Searching for .tex files in $TARGET_DIR"
          find "$TARGET_DIR" -type f -name "*.tex" > found_files.txt
          
          if [ ! -s found_files.txt ]; then
            echo "CRITICAL ERROR: No .tex files found!"
            rm found_files.txt
            exit 1
          fi

          echo "Files to process:"
          cat found_files.txt
          
          while read -r file; do
            [ -z "$file" ] && continue
            echo "----------------------------------------"
            echo "Processing: $file"
            
            if grep -q '\\begin{document}' "$file"; then
              echo "Main document detected. Compiling with latexmk..."
              
              # Wechseln in das Verzeichnis der Datei und kompilieren
              # (oder nutzen Sie -cd, um das Verzeichnis zu wechseln)
              pushd "$(dirname "$file")" > /dev/null
              filename=$(basename "$file")
              latexmk -pdf -interaction=nonstopmode "$filename"
              popd > /dev/null
              
              pdf_file="${file%.tex}.pdf"
              if [ -f "$pdf_file" ]; then
                echo "PDF successfully created: $pdf_file"
                rel_dir=$(dirname "$file")
                mkdir -p "pdf_outputs/$rel_dir"
                mv "$pdf_file" "pdf_outputs/$rel_dir/"
                echo "Moved PDF to output directory."
              else
                echo "ERROR: PDF not generated for $file"
                exit 1
              fi
            else
              echo "Skipping: $file (no \begin{document})"
            fi
          done < found_files.txt
          
          rm found_files.txt
          echo "----------------------------------------"
          echo "Output directory contents:"
          ls -R pdf_outputs

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: folder-pdf-documents
          path: pdf_outputs/
